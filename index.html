<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="T账本">
<link rel="manifest" href="manifest.json">
<title>T账本</title>
<style>
:root {
  --bg: #f2f2f7;
  --bg2: #e5e5ea;
  --card: #ffffff;
  --text: #000000;
  --text2: #6c6c70;
  --text3: #aeaeb2;
  --sep: rgba(60,60,67,0.12);
  --accent: #007aff;
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --safe-t: env(safe-area-inset-top, 44px);
  --safe-b: env(safe-area-inset-bottom, 34px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
  --radius: 12px;
  --hdr: 52px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg2: #1c1c1e;
    --card: #1c1c1e;
    --text: #ffffff;
    --text2: #8e8e93;
    --text3: #48484a;
    --sep: rgba(84,84,88,0.36);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ─────────────────────────────── */
#app { height: 100%; display: flex; flex-direction: column; }

/* ── Header ──────────────────────────────── */
.hdr {
  flex-shrink: 0;
  padding-top: calc(var(--safe-t));
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--sep);
  position: relative;
  z-index: 10;
}
@media (prefers-color-scheme: dark) {
  .hdr { background: rgba(28,28,30,0.85); }
}
.hdr-inner {
  height: var(--hdr);
  display: flex;
  align-items: center;
  padding: 0 16px;
  position: relative;
}
.hdr-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-size: 17px; font-weight: 600; white-space: nowrap;
}
.hdr-back {
  display: flex; align-items: center; gap: 4px;
  color: var(--accent); font-size: 17px; background: none; border: none;
  padding: 8px 0; cursor: pointer;
}
.hdr-back svg { flex-shrink: 0; }
.hdr-action {
  margin-left: auto;
  color: var(--accent); font-size: 17px; background: none; border: none;
  padding: 8px 4px; cursor: pointer; font-weight: 400;
}
.hdr-action.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg2);
}

/* ── Scroll area ─────────────────────────── */
.scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--safe-b) + 16px);
}

/* ── Summary banner ──────────────────────── */
.summary {
  margin: 16px 16px 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-radius: 16px;
  padding: 20px;
  color: white;
}
.summary-label { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
.summary-amount { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; }
.summary-amount.pos { color: #4ade80; }
.summary-amount.neg { color: #f87171; }
.summary-amount.zero { color: white; }
.summary-stats {
  display: flex; gap: 24px; margin-top: 16px;
  padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.15);
}
.summary-stat { }
.summary-stat-val { font-size: 18px; font-weight: 600; }
.summary-stat-label { font-size: 12px; opacity: 0.6; margin-top: 2px; }

/* ── Section ─────────────────────────────── */
.section-header {
  font-size: 13px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 20px 16px 8px;
}

/* ── Card list ───────────────────────────── */
.card-list {
  margin: 0 16px;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 0.5px solid var(--sep);
}
.card-item {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.card-item:not(:last-child)::after {
  content: '';
  position: absolute; bottom: 0; left: 16px; right: 0;
  height: 0.5px; background: var(--sep);
}
.card-item:active { background: var(--bg2); }
.stock-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: white;
  flex-shrink: 0; letter-spacing: -0.5px;
}
.stock-icon.c0 { background: linear-gradient(135deg, #667eea, #764ba2); }
.stock-icon.c1 { background: linear-gradient(135deg, #f093fb, #f5576c); }
.stock-icon.c2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.stock-icon.c3 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
.stock-icon.c4 { background: linear-gradient(135deg, #fa709a, #fee140); }
.stock-icon.c5 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
.card-main { flex: 1; min-width: 0; }
.card-row1 { display: flex; justify-content: space-between; align-items: baseline; }
.card-name { font-size: 16px; font-weight: 600; }
.card-profit { font-size: 16px; font-weight: 600; }
.card-row2 { display: flex; justify-content: space-between; align-items: baseline; margin-top: 3px; }
.card-sub { font-size: 13px; color: var(--text2); }
.card-profit-label { font-size: 12px; color: var(--text3); }
.card-arrow { color: var(--text3); flex-shrink: 0; }

.pos { color: var(--green); }
.neg { color: var(--red); }
.zero { color: var(--text2); }

/* ── Empty state ─────────────────────────── */
.empty {
  text-align: center; padding: 60px 32px;
}
.empty-icon { font-size: 56px; margin-bottom: 16px; }
.empty-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.empty-sub { font-size: 15px; color: var(--text2); line-height: 1.5; }

/* ── FAB ─────────────────────────────────── */
.fab {
  position: fixed;
  right: calc(var(--safe-r) + 20px);
  bottom: calc(var(--safe-b) + 20px);
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent);
  color: white; font-size: 28px; font-weight: 300;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,122,255,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  z-index: 20;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(0,122,255,0.3); }

/* ── Detail header ───────────────────────── */
.detail-hero {
  margin: 16px;
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  border: 0.5px solid var(--sep);
}
.detail-hero-top {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.detail-hero-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: white; flex-shrink: 0;
}
.detail-hero-name { font-size: 20px; font-weight: 700; }
.detail-hero-code { font-size: 14px; color: var(--text2); margin-top: 2px; }
.detail-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.detail-stat {
  text-align: center; padding: 4px 0;
}
.detail-stat:not(:last-child) {
  border-right: 0.5px solid var(--sep);
}
.detail-stat-val { font-size: 17px; font-weight: 600; }
.detail-stat-label { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* ── Trade record ────────────────────────── */
.trade-item {
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.trade-item:active { background: var(--bg2); }
.trade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.trade-date { font-size: 13px; color: var(--text2); }
.trade-profit { font-size: 16px; font-weight: 600; }
.trade-body {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.trade-tag {
  font-size: 13px; color: var(--text2);
  background: var(--bg);
  border-radius: 6px; padding: 3px 8px;
}
.trade-tag .val { color: var(--text); font-weight: 500; }
.trade-meta { font-size: 12px; color: var(--text3); margin-top: 6px; }

/* ── Modal ───────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open {
  opacity: 1; pointer-events: all;
}
.modal {
  width: 100%; background: var(--card);
  border-radius: 20px 20px 0 0;
  padding-bottom: calc(var(--safe-b) + 8px);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 92vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--text3); margin: 12px auto 4px;
}
.modal-title {
  font-size: 17px; font-weight: 600;
  text-align: center; padding: 12px 16px 4px;
}
.modal-subtitle {
  text-align: center; font-size: 13px; color: var(--text2); padding-bottom: 8px;
}

/* ── Form ────────────────────────────────── */
.form { padding: 8px 16px 16px; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }
.form-input {
  width: 100%; background: var(--bg);
  border: 1px solid var(--sep);
  border-radius: 10px; padding: 12px 14px;
  font-size: 16px; color: var(--text);
  font-family: inherit; outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }

.calc-preview {
  background: var(--bg);
  border-radius: 10px; padding: 14px;
  margin: 4px 0 16px;
}
.calc-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.calc-label { font-size: 14px; color: var(--text2); }
.calc-val { font-size: 15px; font-weight: 600; }
.calc-divider {
  height: 0.5px; background: var(--sep); margin: 8px 0;
}
.calc-total-label { font-size: 15px; font-weight: 600; }
.calc-total-val { font-size: 18px; font-weight: 700; }

.btn {
  width: 100%; padding: 15px;
  border-radius: 12px; border: none;
  font-size: 17px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { opacity: 0.85; transform: scale(0.98); }
.btn-primary { background: var(--accent); color: white; }
.btn-danger { background: var(--red); color: white; margin-top: 10px; }
.btn-ghost { background: var(--bg2); color: var(--text); margin-top: 10px; }

/* ── Delete confirm ──────────────────────── */
.action-sheet {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column; justify-content: flex-end;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.action-sheet.open { opacity: 1; pointer-events: all; }
.action-sheet-body {
  margin: 8px;
  padding-bottom: calc(var(--safe-b) + 8px);
}
.action-group {
  background: var(--card);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 8px;
}
.action-btn {
  width: 100%; padding: 16px;
  background: none; border: none;
  font-size: 17px; font-family: inherit;
  cursor: pointer; color: var(--text);
  transition: background 0.15s;
}
.action-btn:active { background: var(--bg2); }
.action-btn:not(:last-child) { border-bottom: 0.5px solid var(--sep); }
.action-btn.danger { color: var(--red); }
.action-btn.accent { color: var(--accent); font-weight: 600; }

/* ── Views ───────────────────────────────── */
.view { display: none; flex-direction: column; height: 100%; }
.view.active { display: flex; }

/* ── Animations ──────────────────────────── */
@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.animate-in { animation: slideIn 0.22s ease-out; }

/* ── Edit button ─────────────────────────── */
.edit-btn {
  color: var(--accent); font-size: 15px;
  background: none; border: none; cursor: pointer;
  padding: 4px 8px;
}

/* ── Trend ───────────────────────────────── */
.trend-stat-row {
  display: flex; gap: 0;
  margin: 16px 16px 0;
}
.trend-stat-box {
  flex: 1; text-align: center;
  padding: 14px 8px;
  background: var(--card);
  border: 0.5px solid var(--sep);
}
.trend-stat-box:first-child { border-radius: 12px 0 0 12px; }
.trend-stat-box:last-child  { border-radius: 0 12px 12px 0; }
.trend-stat-box + .trend-stat-box { border-left: none; }
.trend-stat-box-val   { font-size: 16px; font-weight: 600; }
.trend-stat-box-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
.chart-card {
  margin: 12px 16px 0;
  background: var(--card);
  border-radius: 12px;
  border: 0.5px solid var(--sep);
  padding: 14px 0 6px;
}
.chart-card-title {
  font-size: 12px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 0 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.filter-group { display: inline-flex; gap: 4px; }
.filter-btn {
  background: var(--bg); border: 0.5px solid var(--sep);
  color: var(--text3); font-size: 11px; line-height: 1;
  padding: 4px 8px; border-radius: 6px; cursor: pointer;
  text-transform: none; letter-spacing: 0;
}
.filter-btn.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.chart-box { width: 100%; height: 200px; }
</style>
</head>
<body>
<div id="app">

  <!-- ══ HOME VIEW ══════════════════════════ -->
  <div class="view active" id="view-home">
    <div class="hdr">
      <div class="hdr-inner">
        <span class="hdr-title">T 账本</span>
        <button class="hdr-action" onclick="openEditDataModal()" title="数据管理" style="margin-left:auto;background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;">管理</button>
      </div>
    </div>
    <div class="scroll" id="home-scroll">
      <div id="home-summary"></div>
      <div id="home-list"></div>
    </div>
    <button class="fab" onclick="openAddStockModal()" aria-label="添加持仓">＋</button>
  </div>

  <!-- ══ DETAIL VIEW ════════════════════════ -->
  <div class="view" id="view-detail">
    <div class="hdr">
      <div class="hdr-inner">
        <button class="hdr-back" onclick="goHome()">
          <svg width="10" height="17" viewBox="0 0 10 17" fill="currentColor"><path d="M8.5 1L1 8.5L8.5 16"/></svg>
          持仓
        </button>
        <span class="hdr-title" id="detail-hdr-title">—</span>
        <div style="margin-left:auto;display:flex;align-items:center">
          <button class="hdr-action" style="margin-left:0" onclick="goTrend()">趋势</button>
          <button class="hdr-action edit-btn" style="margin-left:0" onclick="openEditStockModal()">编辑</button>
        </div>
      </div>
    </div>
    <div class="scroll animate-in" id="detail-scroll">
      <div id="detail-content"></div>
    </div>
    <button class="fab" onclick="openDetailFab()" aria-label="记录操作">＋</button>
  </div>

  <!-- ══ TREND VIEW ════════════════════════ -->
  <div class="view" id="view-trend">
    <div class="hdr">
      <div class="hdr-inner">
        <button class="hdr-back" onclick="backFromTrend()">
          <svg width="10" height="17" viewBox="0 0 10 17" fill="currentColor"><path d="M8.5 1L1 8.5L8.5 16"/></svg>
          <span id="trend-back-name">—</span>
        </button>
        <span class="hdr-title">趋势分析</span>
      </div>
    </div>
    <div class="scroll animate-in">
      <div id="trend-content"></div>
    </div>
  </div>

</div>

<!-- ══ MODAL: 加仓 ═══════════════════════ -->
<div class="modal-overlay" id="modal-buy">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">加仓（买入）</div>
    <div class="modal-subtitle" id="buy-modal-subtitle"></div>
    <div class="form">
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" id="buy-date" type="date">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">买入价（元）</label>
          <input class="form-input" id="buy-price" type="number" placeholder="1480.00" inputmode="decimal" step="0.001" oninput="updateBuyCalc()">
        </div>
        <div class="form-group">
          <label class="form-label">买入股数（股）</label>
          <input class="form-input" id="buy-qty" type="number" placeholder="100" inputmode="numeric" step="100" oninput="updateBuyCalc()">
        </div>
      </div>
      <div class="calc-preview" id="buy-calc" style="display:none">
        <div class="calc-row">
          <span class="calc-label">新持仓股数</span>
          <span class="calc-val" id="buy-calc-shares">—</span>
        </div>
        <div class="calc-row">
          <span class="calc-label">成本变化</span>
          <span class="calc-val" id="buy-calc-cost-change">—</span>
        </div>
        <div class="calc-divider"></div>
        <div class="calc-row">
          <span class="calc-total-label">新成本价</span>
          <span class="calc-total-val" id="buy-calc-new-cost">—</span>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveBuy()">记录加仓</button>
      <button class="btn btn-ghost" onclick="closeModal('modal-buy')">取消</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: 卖出减仓 ════════════════════ -->
<div class="modal-overlay" id="modal-sell">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">卖出减仓</div>
    <div class="modal-subtitle" id="sell-modal-subtitle"></div>
    <div class="form">
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" id="sell-date" type="date">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">卖出价（元）</label>
          <input class="form-input" id="sell-price" type="number" placeholder="370.00" inputmode="decimal" step="0.001" oninput="updateSellCalc()">
        </div>
        <div class="form-group">
          <label class="form-label">卖出股数（股）</label>
          <input class="form-input" id="sell-qty" type="number" placeholder="100" inputmode="numeric" step="100" oninput="updateSellCalc()">
        </div>
      </div>
      <div class="calc-preview" id="sell-calc" style="display:none">
        <div class="calc-row">
          <span class="calc-label">本次盈利</span>
          <span class="calc-val" id="sell-calc-profit">—</span>
        </div>
        <div class="calc-row">
          <span class="calc-label">新持仓股数</span>
          <span class="calc-val" id="sell-calc-shares">—</span>
        </div>
        <div class="calc-divider"></div>
        <div class="calc-row">
          <span class="calc-total-label">卖后成本价</span>
          <span class="calc-total-val" id="sell-calc-new-cost">—</span>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveSell()">记录卖出</button>
      <button class="btn btn-ghost" onclick="closeModal('modal-sell')">取消</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: 添加/编辑持仓 ═══════════════ -->
<div class="modal-overlay" id="modal-stock">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-stock-title">添加持仓</div>
    <div class="form">
      <input type="hidden" id="stock-edit-id">
      <input type="hidden" id="stock-form-mode" value="add">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">股票代码</label>
          <input class="form-input" id="stock-code" type="text" placeholder="600519 / 00700 / AAPL">
        </div>
        <div class="form-group">
          <label class="form-label">股票名称</label>
          <input class="form-input" id="stock-name" type="text" placeholder="贵州茅台">
        </div>
      </div>
      <div class="form-row" id="stock-row-price">

    </div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
// ─── State ──────────────────────────────────────────────────────────────────
const STORE_KEY = 't_ledger_v1';
let state = load();
let currentStockId = null;

function load() {
  try {
    return JSON.parse(localStorage.getItem(STORE_KEY)) || { stocks: [] };
  } catch { return { stocks: [] }; }
}
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function fmt(n, decimals = 2) {
  return Number(n).toFixed(decimals);
}
function fmtMoney(n) {
  const abs = Math.abs(n);
  const sign = n > 0 ? '+' : n < 0 ? '-' : '';
  return sign + '¥' + abs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function profitClass(n) {
  if (n > 0) return 'pos';
  if (n < 0) return 'neg';
  return 'zero';
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
const COLORS = ['c0','c1','c2','c3','c4','c5'];
function stockColor(id) {
  const idx = state.stocks.findIndex(s => s.id === id);
  return COLORS[idx % COLORS.length];
}
function stockInitials(stock) {
  return stock.code ? stock.code.slice(-2) : stock.name.slice(0, 2);
}
// 返回这只股票原币盈亏：{amount, cur, sym}
// A 股：cur='CNY' sym='¥'，港股：'HKD' 'HK$'，美股：'USD' 'US$'
function stockProfitOriginal(st) {
  const m = marketOf(st.code);
  const cur = (m === 'HK') ? 'HKD' : (m === 'US') ? 'USD' : 'CNY';
  const sym = (m === 'HK') ? 'HK$' : (m === 'US') ? 'US$' : '¥';
  const amount = (st.trades || [])
    .filter(t => t.type !== 'buy')
    .reduce((s, t) => s + (t.profit || 0), 0);
  return { amount, cur, sym, market: m };
}
// 格式化原币副值：A 股返回空串（已经是 ¥），港美股返回 ' ≈ +HK$XX'
function fmtOrigSub(st) {
  const r = stockProfitOriginal(st);
  if (r.market !== 'HK' && r.market !== 'US') return '';
  const sign = r.amount > 0 ? '+' : r.amount < 0 ? '-' : '';
  const abs = Math.abs(r.amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return `<span style="opacity:0.5;font-size:0.85em;margin-left:4px;font-weight:400">≈ ${sign}${r.sym}${abs}</span>`;
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() { showView('view-home'); renderHome(); }
function goDetail(stockId) {
  currentStockId = stockId;
  showView('view-detail');
  renderDetail(stockId);
}

// ─── Home ─────────────────────────────────────────────────────────────────────
function renderHome() {
  const stocks = state.stocks;

  // Summary
  const totalProfit = stocks.reduce((s, st) => s + (st.totalTProfit || 0), 0);
  const totalTrades = stocks.reduce((s, st) => s + (st.trades || []).filter(t => !t.type || t.type === 't').length, 0);
  const totalStocks = stocks.length;
  const pc = profitClass(totalProfit);
  const hasForeign = stocks.some(s => { const m = marketOf(s.code); return m === 'HK' || m === 'US'; });
  const fx = state.fxSnapshot;
  const fxLabel = (hasForeign && fx)
    ? `<div style="font-size:11px;color:var(--text3);margin-top:6px">汇率快照 ¥${fmt(fx.rUSD)}/$ · ¥${fmt(fx.rHKD)}/HK$${fx.ts ? '（' + new Date(fx.ts).toLocaleDateString('zh-CN') + '）' : '（兜底估算，点「刷新汇率快照」更新）'}</div>`
    : (hasForeign ? '<div style="font-size:11px;color:var(--text3);margin-top:6px">汇率快照未就绪 · 打开「管理」点「刷新汇率快照」</div>' : '');

  document.getElementById('home-summary').innerHTML = `
    <div class="summary">
      <div class="summary-label">累计 T 收益</div>
      <div class="summary-amount ${pc}">${fmtMoney(totalProfit)}</div>
      <div class="summary-stats">
        <div class="summary-stat">
          <div class="summary-stat-val">${totalStocks}</div>
          <div class="summary-stat-label">支股票</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-val">${totalTrades}</div>
          <div class="summary-stat-label">次 T 操作</div>
        </div>
      </div>
      ${fxLabel}
    </div>`;

  if (stocks.length === 0) {
    document.getElementById('home-list').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📊</div>
        <div class="empty-title">还没有持仓</div>
        <div class="empty-sub">点击右下角 ＋ 添加你的第一支持仓股票，开始记录 T 操作</div>
      </div>`;
    return;
  }

  const items = stocks.map((st, i) => {
    const profit = st.totalTProfit || 0;
    const pc = profitClass(profit);
    const color = COLORS[i % COLORS.length];
    return `
      <div class="card-item" onclick="goDetail('${st.id}')">
        <div class="stock-icon ${color}">${stockInitials(st)}</div>
        <div class="card-main">
          <div class="card-row1">
            <span class="card-name">${st.name}${st.code ? ' <span style="font-size:13px;font-weight:400;color:var(--text2)">' + st.code + '</span>' : ''}</span>
            <span class="card-profit ${pc}">${fmtMoney(profit)}${fmtOrigSub(st)}</span>
          </div>
          <div class="card-row2">
            <span class="card-sub">${fmt(st.shares, 0)} 股 · 成本 ¥${fmt(st.avgCost)}</span>
            <span class="card-profit-label">${(st.trades||[]).filter(t=>!t.type||t.type==='t').length} 次T</span>
          </div>
        </div>
        <svg class="card-arrow" width="7" height="12" viewBox="0 0 7 12" fill="currentColor"><path d="M1 1l5 5-5 5"/></svg>
      </div>`;
  }).join('');

  document.getElementById('home-list').innerHTML = `
    <div class="section-header">我的持仓</div>
    <div class="card-list">${items}</div>`;
}

// ─── Detail ───────────────────────────────────────────────────────────────────
function renderDetail(stockId) {
  const st = state.stocks.find(s => s.id === stockId);
  if (!st) { goHome(); return; }

  document.getElementById('detail-hdr-title').textContent = st.name;

  const profit = st.totalTProfit || 0;
  const pc = profitClass(profit);
  const color = stockColor(stockId);
  const trades = (st.trades || []).slice().reverse();
  const tCount = trades.filter(t => !t.type || t.type === 't').length;

  const tradeRows = trades.length === 0
    ? `<div class="empty" style="padding:40px 32px">
        <div class="empty-icon">📝</div>
        <div class="empty-title">还没有操作记录</div>
        <div class="empty-sub">点击右下角 ＋ 记录 T 操作或加仓</div>
       </div>`
    : `<div class="section-header">操作记录（T×${tCount}）</div>
       <div class="card-list">
         ${trades.map((tr, i) => tradeRow(tr, i, trades.length)).join('')}
       </div>`;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-top">
        <div class="detail-hero-icon ${color}">${stockInitials(st)}</div>
        <div>
          <div class="detail-hero-name">${st.name}</div>
          <div class="detail-hero-code">${st.code || '未设置代码'} · T×${(st.trades||[]).filter(t=>!t.type||t.type==='t').length}</div>
        </div>
      </div>
      <div class="detail-stats">
        <div class="detail-stat">
          <div class="detail-stat-val">${fmt(st.shares, 0)}</div>
          <div class="detail-stat-label">持仓股数</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-val">¥${fmt(st.avgCost)}</div>
          <div class="detail-stat-label">当前成本价</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-val ${pc}">${fmtMoney(profit)}${fmtOrigSub(st)}</div>
          <div class="detail-stat-label">累计 T 收益</div>
        </div>
      </div>
    </div>
    ${tradeRows}
    <div style="height:80px"></div>`;
}

function tradeRow(tr) {
  if (tr.type === 'buy') {
    const costDir = tr.costAfter > tr.costBefore ? 'neg' : tr.costAfter < tr.costBefore ? 'pos' : 'zero';
    const costArrow = tr.costAfter > tr.costBefore ? '↑' : tr.costAfter < tr.costBefore ? '↓' : '→';
    return `
      <div class="card-item trade-item" onclick="showTradeActions('${tr.id}')">
        <div style="flex:1">
          <div class="trade-header">
            <span class="trade-date">${tr.date} <span style="background:var(--orange);color:white;font-size:11px;padding:1px 6px;border-radius:4px;margin-left:4px">加仓</span></span>
            <span class="trade-profit" style="color:var(--orange)">+${fmt(tr.qty,0)}股</span>
          </div>
          <div class="trade-body">
            <span class="trade-tag">买入价 <span class="val">¥${fmt(tr.price, 3)}</span></span>
            <span class="trade-tag">数量 <span class="val">${fmt(tr.qty,0)}股</span></span>
          </div>
          <div class="trade-meta">持仓 ${fmt(tr.sharesBefore,0)} → ${fmt(tr.sharesAfter,0)}股 · 成本 ¥${fmt(tr.costBefore)} <span class="${costDir}">${costArrow} ¥${fmt(tr.costAfter)}</span></div>
        </div>
      </div>`;
  }
  if (tr.type === 'sell') {
    const pc = profitClass(tr.profit);
    return `
      <div class="card-item trade-item" onclick="showTradeActions('${tr.id}')">
        <div style="flex:1">
          <div class="trade-header">
            <span class="trade-date">${tr.date} <span style="background:var(--green);color:white;font-size:11px;padding:1px 6px;border-radius:4px;margin-left:4px">减仓</span></span>
            <span class="trade-profit ${pc}">${fmtMoney(tr.profit)}</span>
          </div>
          <div class="trade-body">
            <span class="trade-tag">卖出价 <span class="val">¥${fmt(tr.price, 3)}</span></span>
            <span class="trade-tag">数量 <span class="val">${fmt(tr.qty,0)}股</span></span>
          </div>
          <div class="trade-meta">持仓 ${fmt(tr.sharesBefore,0)} → ${fmt(tr.sharesAfter,0)}股 · 成本 ¥${fmt(tr.costAfter)}（按均价结转）</div>
        </div>
      </div>`;
  }
  const pc = profitClass(tr.profit);
  const sellVal = tr.sell !== undefined ? tr.sell : tr.sellPrice;
  const buyVal = tr.buy !== undefined ? tr.buy : tr.buyPrice;
  return `
    <div class="card-item trade-item" onclick="showTradeActions('${tr.id}')">
      <div style="flex:1">
        <div class="trade-header">
          <span class="trade-date">${tr.date} <span style="background:var(--accent);color:white;font-size:11px;padding:1px 6px;border-radius:4px;margin-left:4px">T</span></span>
          <span class="trade-profit ${pc}">${fmtMoney(tr.profit)}</span>
        </div>
        <div class="trade-body">
          <span class="trade-tag">卖 <span class="val">¥${fmt(sellVal, 3)}</span></span>
          <span class="trade-tag">买 <span class="val">¥${fmt(buyVal, 3)}</span></span>
          <span class="trade-tag">量 <span class="val">${fmt(tr.qty || tr.quantity, 0)}股</span></span>
        </div>
        <div class="trade-meta">成本 ${tr.costBefore !== undefined ? '¥' + fmt(tr.costBefore) + ' → ' : ''}¥${fmt(tr.costAfter)} ${tr.note ? '· ' + tr.note : ''}</div>
      </div>
    </div>`;
}

// ─── Add/Edit Stock ────────────────────────────────────────────────────────────
function setStockFormMode(mode) {
  // mode: 'add'（显示全部字段）/ 'edit'（只显示代码/名称）
  document.getElementById('stock-form-mode').value = mode;
  const isAdd = mode === 'add';
  document.getElementById('stock-row-price').style.display = isAdd ? '' : 'none';
  document.getElementById('stock-delete-btn').style.display = isAdd ? 'none' : '';
}
function openAddStockModal() {
  document.getElementById('modal-stock-title').textContent = '添加持仓';
  document.getElementById('stock-edit-id').value = '';
  document.getElementById('stock-code').value = '';
  document.getElementById('stock-name').value = '';
  document.getElementById('stock-shares').value = '';
  document.getElementById('stock-cost').value = '';
  setStockFormMode('add');
  openModal('modal-stock');
}
function openEditStockModal() {
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st) return;
  document.getElementById('modal-stock-title').textContent = '编辑持仓';
  document.getElementById('stock-edit-id').value = st.id;
  document.getElementById('stock-code').value = st.code || '';
  document.getElementById('stock-name').value = st.name;
  document.getElementById('stock-shares').value = st.shares;
  document.getElementById('stock-cost').value = fmt(st.avgCost);
  setStockFormMode('edit');
  openModal('modal-stock');
}
function saveStock() {
  const editId = document.getElementById('stock-edit-id').value;
  const code = document.getElementById('stock-code').value.trim();
  const name = document.getElementById('stock-name').value.trim();
  if (!name) return alert('请填写股票名称');

  if (editId) {
    // 编辑模式：仅改代码 / 名称（股数/成本不在此处改，请用加仓 / 减仓 / T 操作)
    const st = state.stocks.find(s => s.id === editId);
    if (st) { st.code = code; st.name = name; }
    save();
    closeModal('modal-stock');
    renderDetail(editId);
    return;
  }

  // 添加模式：四字段都要填
  const shares = parseFloat(document.getElementById('stock-shares').value);
  const avgCost = parseFloat(document.getElementById('stock-cost').value);
  if (isNaN(shares) || shares <= 0) return alert('请填写正确的持仓股数');
  if (isNaN(avgCost) || avgCost <= 0) return alert('请填写正确的成本价');
  state.stocks.push({ id: uid(), code, name, shares, avgCost, initialShares: shares, initialCost: avgCost, totalTProfit: 0, trades: [] });
  save();
  closeModal('modal-stock');
  renderHome();
}

// ─── Detail FAB ───────────────────────────────────────────────────────────────
function openDetailFab() {
  const st = state.stocks.find(s => s.id === currentStockId);
  const actions = [
    { label: '记录 T 操作（高抛低吸）', action: openAddTradeModal },
    { label: '加仓（新买入股票）', action: openAddBuyModal },
  ];
  if (st && st.shares > 0) actions.push({ label: '卖出减仓', action: openAddSellModal });
  showActionSheet(actions);
}

// ─── Add Buy ──────────────────────────────────────────────────────────────────
function openAddBuyModal() {
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st) return;
  document.getElementById('buy-modal-subtitle').textContent =
    `${st.name} · 当前 ${fmt(st.shares,0)}股 · 成本 ¥${fmt(st.avgCost)}`;
  document.getElementById('buy-date').value = todayStr();
  document.getElementById('buy-price').value = '';
  document.getElementById('buy-qty').value = '';
  document.getElementById('buy-calc').style.display = 'none';
  openModal('modal-buy');
}
function updateBuyCalc() {
  const price = parseFloat(document.getElementById('buy-price').value);
  const qty = parseFloat(document.getElementById('buy-qty').value);
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st || isNaN(price) || isNaN(qty) || qty <= 0) {
    document.getElementById('buy-calc').style.display = 'none';
    return;
  }
  const newShares = st.shares + qty;
  const newCost = (st.shares * st.avgCost + qty * price) / newShares;
  const diff = newCost - st.avgCost;
  document.getElementById('buy-calc').style.display = 'block';
  document.getElementById('buy-calc-shares').textContent = `${fmt(st.shares,0)} → ${fmt(newShares,0)} 股`;
  document.getElementById('buy-calc-cost-change').textContent =
    (diff >= 0 ? '+' : '') + fmt(diff, 4) + ' 元/股';
  document.getElementById('buy-calc-cost-change').className = 'calc-val ' + (diff > 0 ? 'neg' : diff < 0 ? 'pos' : 'zero');
  document.getElementById('buy-calc-new-cost').textContent = '¥' + fmt(newCost);
}
function saveBuy() {
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st) return;
  const date = document.getElementById('buy-date').value;
  const price = parseFloat(document.getElementById('buy-price').value);
  const qty = parseFloat(document.getElementById('buy-qty').value);
  if (!date) return alert('请选择日期');
  if (isNaN(price) || price <= 0) return alert('请填写买入价');
  if (isNaN(qty) || qty <= 0) return alert('请填写买入股数');

  const sharesBefore = st.shares;
  const costBefore = st.avgCost;
  const sharesAfter = st.shares + qty;
  const costAfter = (st.shares * st.avgCost + qty * price) / sharesAfter;

  st.trades.push({ id: uid(), type: 'buy', date, price, qty, sharesBefore, sharesAfter, costBefore, costAfter });
  st.shares = sharesAfter;
  st.avgCost = costAfter;
  save();
  closeModal('modal-buy');
  renderDetail(currentStockId);
}

// ─── Sell (减仓，移动加权平均) ─────────────────────────────────────────────────
// 卖出盈亏 = (卖出价 − 当前均价) × 量；卖出部分按均价结转，剩下来的均价不变。
function computeSell(st, price, sellQty) {
  if (sellQty > st.shares) return null;
  const profit = (price - st.avgCost) * sellQty;
  const newShares = st.shares - sellQty;
  const newCost = newShares > 0 ? st.avgCost : 0;  // 加权平均下卖出不改均价
  return { profit, newShares, newCost };
}

function openAddSellModal() {
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st) return;
  if (st.shares <= 0) return alert('当前无持仓，无法卖出');
  document.getElementById('sell-modal-subtitle').textContent =

function updateSellCalc() {

async function saveSell() {
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st) return;
  const date = document.getElementById('sell-date').value;
  const price = parseFloat(document.getElementById('sell-price').value);
  const qty = parseFloat(document.getElementById('sell-qty').value);
  if (!date) return alert('请选择日期');
  if (isNaN(price) || price <= 0) return alert('请填写卖出价');
  if (isNaN(qty) || qty <= 0) return alert('请填写卖出股数');
  if (qty > st.shares) return alert(`卖出股数(${fmt(qty,0)})超过持仓(${fmt(st.shares,0)})`);

  const sharesBefore = st.shares;
  const costBefore = st.avgCost;
  const r = computeSell(st, price, qty);
  if (!r) return alert('持仓不足以完成此次卖出');

  // 按 trade 当下汇率换算成 CNY → profitCNY / fxRate
  const trade = {
    id: uid(), type: 'sell', date, price, qty,
    profit: r.profit, sharesBefore, sharesAfter: r.newShares,
    costBefore, costAfter: r.newCost,
  };
  await assignProfitCNY(trade, marketOf(st.code));
  st.trades.push(trade);
  st.shares = r.newShares;
  st.avgCost = r.newCost;
  st.totalTProfit = (st.totalTProfit || 0) + trade.profitCNY;  // totalTProfit 是 CNY
  save();
  closeModal('modal-sell');
  renderDetail(currentStockId);
}

function updateTradeCalc() {
  const sell = parseFloat(document.getElementById('trade-sell').value);
  const buy = parseFloat(document.getElementById('trade-buy').value);
  const qty = parseFloat(document.getElementById('trade-qty').value);
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st || isNaN(sell) || isNaN(buy) || isNaN(qty) || qty <= 0) {
    document.getElementById('trade-calc').style.display = 'none';
    return;
  }
  // 编辑模式：用该记录的 costBefore 作为基准
  const editId = document.getElementById('trade-edit-id').value;
  const baseCost = editId
    ? ((st.trades || []).find(t => t.id === editId) || {}).costBefore ?? st.avgCost
    : st.avgCost;
  const profit = (sell - buy) * qty;
  const newCost = (st.shares * baseCost - profit) / st.shares;
  const drop = baseCost - newCost;

  document.getElementById('trade-calc').style.display = 'block';
  document.getElementById('calc-profit').textContent = fmtMoney(profit);
  document.getElementById('calc-profit').className = 'calc-val ' + profitClass(profit);
  document.getElementById('calc-cost-drop').textContent = (drop >= 0 ? '-¥' : '+¥') + Math.abs(drop).toFixed(4) + '/股';
  document.getElementById('calc-cost-drop').className = 'calc-val ' + (drop >= 0 ? 'pos' : 'neg');
  document.getElementById('calc-new-cost').textContent = '¥' + fmt(newCost);
}
async function saveTrade() {
  const st = state.stocks.find(s => s.id === currentStockId);
  if (!st) return;
  const editId = document.getElementById('trade-edit-id').value;
  const date = document.getElementById('trade-date').value;
  const sell = parseFloat(document.getElementById('trade-sell').value);
  const buy = parseFloat(document.getElementById('trade-buy').value);
  const qty = parseFloat(document.getElementById('trade-qty').value);

  if (!date) return alert('请选择日期');
  if (isNaN(sell) || sell <= 0) return alert('请填写卖出价');
  if (isNaN(buy) || buy <= 0) return alert('请填写买入价');
  if (isNaN(qty) || qty <= 0) return alert('请填写数量');
  if (sell <= buy) {
    if (!confirm(`卖出价(${sell}) ≤ 买入价(${buy})，此次T亏损，确认记录？`)) return;
  }

  const mk = marketOf(st.code);
  if (editId) {
    // 编辑：先撤销旧记录影响，再应用新数值（按当前最新汇率重算 CNY）
    const tr = (st.trades || []).find(t => t.id === editId);
    if (!tr) return;
    const costBefore = tr.costBefore;  // 该记录之前的成本（不变）
    const newProfit = (sell - buy) * qty;
    const newCostAfter = (st.shares * costBefore - newProfit) / st.shares;
    const oldProfitCNY = tr.profitCNY !== undefined ? tr.profitCNY : tr.profit;
    tr.date = date; tr.sell = sell; tr.buy = buy; tr.qty = qty;
    tr.profit = newProfit; tr.costAfter = newCostAfter;
    await assignProfitCNY(tr, mk);  // 更新 profitCNY 与 fxRate
    st.totalTProfit = (st.totalTProfit || 0) - oldProfitCNY + tr.profitCNY;
    st.avgCost = newCostAfter;
  } else {
    const profit = (sell - buy) * qty;
    const costBefore = st.avgCost;
    const costAfter = (st.shares * st.avgCost - profit) / st.shares;
    const trade = { id: uid(), date, sell, buy, qty, profit, costBefore, costAfter };
    await assignProfitCNY(trade, mk);
    st.trades.push(trade);
    st.totalTProfit = (st.totalTProfit || 0) + trade.profitCNY;
    st.avgCost = costAfter;
  }
  save();
  closeModal('modal-trade');
  renderDetail(currentStockId);
}

function recomputeStock(st) {
  // 从 trades 完整重放，得到自洽的 shares/avgCost/totalTProfit。
  // 移动加权平均：卖出按均价结转，剩下来的均价不变。
  if (!st.initialShares || !st.initialCost) {
    if (st.trades && st.trades.length) {
      const first = st.trades[0];
      st.initialShares = first.sharesBefore !== undefined ? first.sharesBefore : st.shares;
      st.initialCost = first.costBefore !== undefined ? first.costBefore : st.avgCost;
    } else {
      st.initialShares = st.shares;
      st.initialCost = st.avgCost;
    }
  }
  st.shares = st.initialShares;
  st.avgCost = st.initialCost;
  st.totalTProfit = 0;

  (st.trades || []).forEach(tr => {
    if (tr.type === 'buy') {
      const costAfter = (st.shares * st.avgCost + tr.qty * tr.price) / (st.shares + tr.qty);
      tr.sharesBefore = st.shares; tr.costBefore = st.avgCost;
      st.shares += tr.qty; st.avgCost = costAfter;
      tr.sharesAfter = st.shares; tr.costAfter = costAfter;
    } else if (tr.type === 'sell') {
      const profit = (tr.price - st.avgCost) * tr.qty;
      tr.sharesBefore = st.shares; tr.costBefore = st.avgCost;
      tr.sharesAfter = st.shares - tr.qty; tr.costAfter = st.avgCost;  // 加权平均下均价不变
      st.shares -= tr.qty;
      tr.profit = profit;
      st.totalTProfit += tr.profitCNY !== undefined ? tr.profitCNY : profit;  // 用 CNY 快照
    } else {  // T 操作：高抛低吸，数量不变，利润冲减成本
      const profit = (tr.sell - tr.buy) * tr.qty;
      const costAfter = (st.shares * st.avgCost - profit) / st.shares;
      tr.costBefore = st.avgCost; tr.costAfter = costAfter; tr.profit = profit;
      st.avgCost = costAfter;
      st.totalTProfit += tr.profitCNY !== undefined ? tr.profitCNY : profit;  // 用 CNY 快照
    }
  });
}

function deleteTrade(stockId, tradeId) {
  const st = state.stocks.find(s => s.id === stockId);
  if (!st) return;
  st.trades = (st.trades || []).filter(t => t.id !== tradeId);
  recomputeStock(st);
  save();
  renderDetail(stockId);
}

// 老数据迁移：如果 trade 没有 profitCNY，按当前 fxSnapshot 一次性换算填上。
// 同时重算 st.totalTProfit（旧版可能是原币值）。
async function migrateLegacyFx() {
  // 任何状态下都先确保 fxSnapshot 存在（拉一次或用兜底）
  return await recomputeAllProfitCNY(false);
}
// 重算所有 trade 的 profitCNY
//   force=false 时只填缺失的（迁移老 JSON 用）
//   force=true 时无视已有 profitCNY，按最新 fxSnapshot 全部重算（导入新 JSON 时统一）
async function recomputeAllProfitCNY(force) {
  if (!state.fxSnapshot || !state.fxSnapshot.ts) await fetchFX();
  if (!state.fxSnapshot) state.fxSnapshot = { ts: 0, rUSD: 7.2, rHKD: 0.92 };
  for (const st of state.stocks) {
    const m = marketOf(st.code);
    const fx = (m === 'US') ? state.fxSnapshot.rUSD
              : (m === 'HK') ? state.fxSnapshot.rHKD
              : 1;
    for (const tr of (st.trades || [])) {
      if (tr.type === 'buy') continue;
      if (force || tr.profitCNY === undefined) {
        tr.profitCNY = +((tr.profit || 0) * fx).toFixed(4);
        tr.fxRate = fx;
        if (force || !tr.migratedAt) tr.migratedAt = Date.now();
      }
    }
    // 重算 totalTProfit（CNY）
    st.totalTProfit = (st.trades || [])
      .filter(t => t.type !== 'buy')
      .reduce((s, t) => s + (t.profitCNY || 0), 0);
  }
  save();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.stocks) throw new Error('格式错误');
      if (!confirm(`导入将覆盖现有数据（${state.stocks.length}支股票），确认？`)) return;
      state = data;
      // 导入后清除 fxSnapshot 强制刷新（用本机当前汇率作为新基准）
      state.fxSnapshot = null; _fxCache = null;
      save();
      closeModal('modal-data');
      renderHome();
      // 强制迁移 + 重算所有 trade 的 profitCNY（包括那些已带旧值的）
      await recomputeAllProfitCNY(true);
      renderHome();
      alert('导入成功！收益已按当前汇率换算并固化。');
    } catch { alert('文件格式错误，请选择正确的T账本导出文件'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

    }},
    xAxis: { ...xBase, data: costDates, axisLabel: { ...xBase.axisLabel, formatter: v => v.slice(5) } },
    yAxis: { ...yBase, scale: true, axisLabel: { ...yBase.axisLabel, formatter: v => '¥' + v } },
    series: [{
      type: 'line', data: costVals, smooth: false,
      symbol: 'circle', symbolSize: 5,
      lineStyle: { color: th.green, width: 2 },
      itemStyle: { color: p => costClrs[p.dataIndex] },
    }],
  });

  // ── Chart 3: Rolling win rate (last 10 T trades) ──────────────────────────
  const winRates = tTrades.map((_, i) => {
    const w = tTrades.slice(Math.max(0, i - 9), i + 1);
    return +(w.filter(t => t.profit > 0).length / w.length * 100).toFixed(1);
  });
  const tradeLabels = tTrades.map((_, i) => `#${i + 1}`);

  const c3 = echarts.init(document.getElementById('chart-winrate'));
  _trendCharts.push(c3); _trendChartIds.push('chart-winrate');
  c3.setOption({
    grid,
    tooltip: { ...tipBase, formatter: p => `第 ${p[0].dataIndex + 1} 笔 · ${tTrades[p[0].dataIndex]?.date}<br/>近10笔胜率 <b>${p[0].value}%</b>` },
    xAxis: { ...xBase, data: tradeLabels, axisLabel: { ...xBase.axisLabel, interval: Math.max(0, Math.floor(tTrades.length / 7) - 1) } },
    yAxis: { ...yBase, min: 0, max: 100, axisLabel: { ...yBase.axisLabel, formatter: v => v + '%' } },
    series: [{
      type: 'line', data: winRates, smooth: true,
      symbol: 'circle', symbolSize: 4,
      lineStyle: { color: th.accent, width: 2 },
      itemStyle: { color: p => winRates[p.dataIndex] >= 50 ? th.green : th.red },
      markLine: { silent: true, symbol: 'none',
        lineStyle: { color: th.text, type: 'dashed', opacity: 0.4 },
        data: [{ yAxis: 50, label: { formatter: '50%', color: th.text, fontSize: 10 } }] }
    }],
  });

  // ── Chart 4: 买卖点位 + 行情 (异步) ─────────────────────────────────────────
  renderTradePointsChart(st, allTrades, th, myToken, currentRange);
  // 绑定筛选按钮事件（range 切换时只重画这一张图）
  document.querySelectorAll('#tradepoints-filter .filter-btn').forEach(btn => {
    btn.onclick = () => {
      currentRange = btn.dataset.range;
      // 视觉态：active class 互斥
      document.querySelectorAll('#tradepoints-filter .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
      // 重画前先把旧的 chart-tradepoints 实例 dispose（避免重复 init 累积）
      const i = _trendChartIds.lastIndexOf('chart-tradepoints');
      if (i >= 0 && _trendCharts[i]) { try { _trendCharts[i].dispose(); } catch(e){} }
      _trendCharts.splice(i, 1); _trendChartIds.splice(i, 1);
      renderTradePointsChart(st, allTrades, th, myToken, currentRange);
    };
  });
}

// 腾讯日 K 接口：返回 [{date, open, close, high, low, vol}, ...] 或 null
// 支持三市场：A 股 (sh/sz)、港股 (hk)、美股 (us)

// ─── 市场判定与汇率 ────────────────────────────────────────────────────────────
// 返回 'A'/'HK'/'US'/null，以及该市场的计价币种
function marketOf(code) {
  const sym = String(code || '').trim().toUpperCase();
  if (!sym) return null;
  if (/^\d{6}$/.test(sym)) return 'A';    // A 股
  if (/^\d{5}$/.test(sym)) return 'HK';   // 港股
  if (/^[A-Z]{1,5}$/.test(sym)) return 'US';  // 美股
  return null;
}
function tencentSymbol(code) {
  const m = marketOf(code); if (!m) return null;
  const sym = String(code).trim().toUpperCase();
  if (m === 'A') return (sym[0] === '6' || sym[0] === '5' ? 'sh' : 'sz') + sym;
  if (m === 'HK') return 'hk' + sym;
  return 'us' + sym;
}
function currencyOf(market) {
  return market === 'HK' ? 'HKD' : market === 'US' ? 'USD' : 'CNY';
}

// 汇率快照机制：
// - state.fxSnapshot = { ts, rUSD, rHKD } 是已固化的快照，每次港美股交易都刷新
// - 显示层用固化值；只在新建港美股交易时才拉一次实时汇率
let _fxCache = null;
async function fetchFX() {
  // 内存缓存 12h；同时维护 state.fxSnapshot 用于持久化
  if (_fxCache && Date.now() - _fxCache.ts < 12 * 3600 * 1000) return _fxCache;
  const fallback = { ts: 0, rUSD: 7.2, rHKD: 0.92 };
  try {
    const [u, h] = await Promise.all([
      fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json()),
      fetch('https://open.er-api.com/v6/latest/HKD').then(r => r.json()),
    ]);
    if (u?.result !== 'success' || h?.result !== 'success') throw new Error('fx failed');
    _fxCache = { ts: Date.now(), rUSD: u.rates.CNY || 7.2, rHKD: h.rates.CNY || 0.92 };
  } catch (e) {
    _fxCache = fallback;
    console.warn('[fx] 拉汇率失败，使用兜底值:', e);
  }
  // 不论成功失败都持久化（兜底也写，避免 state.fxSnapshot 长期为 null 影响显示）
  state.fxSnapshot = { ts: _fxCache.ts, rUSD: _fxCache.rUSD, rHKD: _fxCache.rHKD };
  save();
  return _fxCache;
}
// 当前市场汇率：港美股拉(fetchFX)、A 股 / 未知返回 1
async function fxForMarket(market) {
  if (market !== 'HK' && market !== 'US') return 1;
  const fx = await fetchFX();
  return market === 'US' ? fx.rUSD : fx.rHKD;
}
async function refreshFX() {
  // 用按钮 caption 表示"加载中"，避免用 alert 阻塞
  const btn = event?.target;
  const oldText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = '刷新中…'; }
  _fxCache = null;  // 强制不命中缓存
  const fx = await fetchFX();
  if (btn) { btn.disabled = false; btn.textContent = oldText; }
  // 重算现有 trade 的 profitCNY（让用户下次看到准确值）
  await migrateLegacyFx();
  renderHome();
  if (fx.ts > 0) {
    alert(`已更新：¥${fx.rUSD.toFixed(4)}/$ · ¥${fx.rHKD.toFixed(4)}/HK$（${new Date(fx.ts).toLocaleString('zh-CN')}）`);
  } else {
    alert('拉取失败（网络或接口问题），已使用兜底汇率 ¥7.2/$、¥0.92/HK$。下次有网会自动重试。');
  }
}
// 当前市场汇率：港美股拉(fetchFX)、A 股 / 未知返回 1
// 注：永远返回最新汇率（用于新交易发生时换算，并写进 trade.profitCNY 作为快照）
async function fxForMarket(market) {
  if (market !== 'HK' && market !== 'US') return 1;
  const fx = await fetchFX();
  return market === 'US' ? fx.rUSD : fx.rHKD;
}
// 把单笔原币 profit 换算成 CNY 并写进 tr.profitCNY；港美股会刷新 fxSnapshot
async function assignProfitCNY(tr, market) {
  const fx = await fxForMarket(market);
  tr.profitCNY = +(tr.profit * fx).toFixed(4);
  tr.fxRate = fx;  // 留存当时汇率快照
  return tr.profitCNY;
}

async function fetchTencentKline(code, count = 90) {
  const prefix = tencentSymbol(code);
  if (!prefix) return null;
  const sym = String(code).trim().toUpperCase();
  const url = `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${prefix},day,,,${count},qfq`;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const j = await res.json();
    // A 股返回 qfqday（前复权），港美市场返回 day（无复权字段）
    const arr = j?.data?.[prefix]?.qfqday || j?.data?.[prefix]?.day;
    if (!Array.isArray(arr)) return null;
    return arr.map(r => ({ date: r[0], open: +r[1], close: +r[2], high: +r[3], low: +r[4], vol: +r[5] }));
  } catch { return null; }
}

async function renderTradePointsChart(st, allTrades, th, myToken, range = 'all') {
  const fresh = () => myToken === _trendRenderToken;  // 异步回来时确认还是当前渲染
  const el = document.getElementById('chart-tradepoints');
  const titleEl = document.getElementById('chart-tradepoints-title-text');
  if (!el || !fresh()) return;

  // range → 最近 N 天（包含开/闭日期区间）
  const sinceMs = range === 'week' ? Date.now() - 7 * 86400e3
                : range === 'month' ? Date.now() - 30 * 86400e3
                : 0;
  const inRange = d => !sinceMs || (new Date(d).getTime() >= sinceMs);

  // 收集买卖点位
  const points = [];  // {date, price, kind: 'buy' | 'sell', qty, size, tLike}
  allTrades.forEach(tr => {
    if (!inRange(tr.date)) return;
    if (tr.type === 'buy') {
      points.push({ date: tr.date, price: tr.price, kind: 'buy', qty: tr.qty, size: Math.min(16, 6 + tr.qty/200) });
    } else if (tr.type === 'sell') {
      points.push({ date: tr.date, price: tr.price, kind: 'sell', qty: tr.qty, size: Math.min(16, 6 + tr.qty/200) });
    } else {  // T 操作：分别画卖/买两个点
      points.push({ date: tr.date, price: tr.sell, kind: 'sell', qty: tr.qty, size: Math.min(12, 4 + tr.qty/200), tLike: true });
      points.push({ date: tr.date, price: tr.buy,  kind: 'buy',  qty: tr.qty, size: Math.min(12, 4 + tr.qty/200), tLike: true });
    }
  });

  // 拉行情（可能失败 / 用户没填代码）；K 线天数按 range 决定
  const kCount = range === 'week' ? 14 : range === 'month' ? 45 : 90;
  const kline = await fetchTencentKline(st.code, kCount);
  if (!fresh()) return;  // 已被新渲染取代
  // 进一步按 range 起 cutoff 截断 K 线（接口返回的日历日 != 自然天数）
  const trimmed = kline ? kline.filter(k => inRange(k.date)) : null;

  // 没行情 → 只画点，标题改一下
  if (!trimmed || !trimmed.length) {
    titleEl.textContent = st.code ? `买卖点位（${st.code} 行情获取失败）` : '买卖点位（请在持仓里填股票代码）';
    const c4 = echarts.init(el);
    _trendCharts.push(c4); _trendChartIds.push('chart-tradepoints');
    c4.setOption({
      grid: { left: 8, right: 16, top: 16, bottom: 36, containLabel: true },
      tooltip: { trigger: 'item', backgroundColor: th.bg, borderColor: th.line, textStyle: { color: th.text1, fontSize: 12 },
        formatter: p => `${p.data[0]}<br/>¥${p.data[1]} · ${p.data[2]==='buy'?'买':'卖'} · ${p.data[3]}股` },
      xAxis: { type: 'category', data: points.map(p=>p.date).sort(),
        axisLine: { lineStyle: { color: th.line } }, axisTick: { show: false },
        axisLabel: { fontSize: 10, color: th.text, formatter: v => v.slice(5) } },
      yAxis: { type: 'value', scale: true,
        splitLine: { lineStyle: { color: th.line } },
        axisLabel: { fontSize: 10, color: th.text, formatter: v => '¥' + v } },
      series: [{
        type: 'scatter',
        data: points.map(p => [p.date, p.price, p.kind, p.qty]),
        symbolSize: 18,
        itemStyle: { color: p => points[p.dataIndex].kind === 'buy' ? th.orange : th.green, opacity: 0.9 },
        label: {
          show: true, position: 'inside', formatter: p => p.data[2] === 'buy' ? 'B' : 'S',
          color: '#fff', fontWeight: 'bold', fontSize: 11,
        },
      }],
    });
    return;
  }

  // 有行情 → K 线 + 散点叠加
  // 构建统一时间轴：K 线日期 ∪ trade 日期（去重升序），避免交易被强行"贴"到不相关的 K 上
  const kDatesRaw = trimmed.map(k => k.date);
  const tradeDates = points.map(p => p.date);
  const xDates = Array.from(new Set([...kDatesRaw, ...tradeDates])).sort();
  const kLineMap = new Map(trimmed.map(k => [k.date, k]));
  const kData = xDates.map(d => {
    const k = kLineMap.get(d);
    return k ? [k.open, k.close, k.low, k.high] : null;  // 无 K 线当天用 null 跳过蜡烛
  });
  const xIdx = new Map(xDates.map((d, i) => [d, i]));

  const buyScatter = points.filter(p => p.kind === 'buy').map(p => [xIdx.get(p.date), p.price, p.qty, p.date, p.tLike]);
  const sellScatter = points.filter(p => p.kind === 'sell').map(p => [xIdx.get(p.date), p.price, p.qty, p.date, p.tLike]);

  const c4 = echarts.init(el);
  _trendCharts.push(c4); _trendChartIds.push('chart-tradepoints');
  c4.setOption({
    grid: { left: 8, right: 16, top: 16, bottom: 36, containLabel: true },
    legend: { top: 0, right: 8, textStyle: { color: th.text, fontSize: 10 },
      data: [
        { name: '加仓/买入', itemStyle: { color: th.orange } },
        { name: '减仓/卖出', itemStyle: { color: th.green } },
        { name: '日 K', icon: 'rect', itemStyle: { color: th.accent } },
      ] },
    tooltip: { trigger: 'axis', backgroundColor: th.bg, borderColor: th.line, textStyle: { color: th.text1, fontSize: 12 },
      formatter: params => {
        const d = xDates[params[0].dataIndex] || params[0].axisValue;
        let out = `${d}<br/>`;
        params.forEach(p => {
          if (p.seriesType === 'candlestick') return;
          if (p.seriesType === 'scatter') {
            const [, price, qty, , tLike] = p.data;
            out += `${p.marker} ${p.seriesName} ¥${price} × ${qty}股${tLike ? ' (T)' : ''}<br/>`;
          }
        });
        return out;
      } },
    xAxis: { type: 'category', data: xDates, boundaryGap: true,
      axisLine: { lineStyle: { color: th.line } }, axisTick: { show: false },
      axisLabel: { fontSize: 10, color: th.text, formatter: v => v.slice(5) } },
    yAxis: { type: 'value', scale: true,
      splitLine: { lineStyle: { color: th.line } },
      axisLabel: { fontSize: 10, color: th.text, formatter: v => '¥' + v } },
    series: [
      {
        name: '日 K', type: 'candlestick', data: kData,
        itemStyle: { color: '#ef5350', color0: '#26a69a', borderColor: '#ef5350', borderColor0: '#26a69a' },
      },
      {
        name: '加仓/买入', type: 'scatter', data: buyScatter,
        symbolSize: d => d[4] ? Math.min(14, d[2]/200 + 10) : Math.min(20, d[2]/200 + 14),
        itemStyle: { color: th.orange, opacity: 0.9 },
        label: { show: true, position: 'inside', formatter: 'B', color: '#fff', fontWeight: 'bold', fontSize: 10 },
      },
      {
        name: '减仓/卖出', type: 'scatter', data: sellScatter,
        symbolSize: d => d[4] ? Math.min(14, d[2]/200 + 10) : Math.min(20, d[2]/200 + 14),
        itemStyle: { color: th.green, opacity: 0.9 },
        label: { show: true, position: 'inside', formatter: 'S', color: '#fff', fontWeight: 'bold', fontSize: 10 },
        markLine: { silent: true, symbol: 'none',
          lineStyle: { color: th.text, type: 'dashed', opacity: 0.5 },
          data: [{ yAxis: st.avgCost, label: { formatter: `成本 ¥${fmt(st.avgCost)}`, color: th.text, fontSize: 10 } }] }
      },
    ],
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
// 后台异步迁移老数据（无 fxSnapshot 或有未换算 trade 时触发）；不阻塞首屏渲染
async function startupMigrate() {
  const stocks = state.stocks || [];
  const hasForeign = stocks.some(s => { const m = marketOf(s.code); return m === 'HK' || m === 'US'; });
  const needsMigration = !state.fxSnapshot
    || (hasForeign && !state.fxSnapshot.ts)
    || stocks.some(s => (s.trades || []).some(t => t.profitCNY === undefined && t.type !== 'buy'));
  if (!needsMigration) return;
  await migrateLegacyFx();
  renderHome();  // 迁移完用新值重渲一次
}
startupMigrate();
renderHome();
</script>
